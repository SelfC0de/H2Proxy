name: Build H2Proxy IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  XCODE_VERSION: "15.4"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('project.yml', '**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Delete old caches
        run: |
          echo "Cleaning caches older than 1 day..."
          gh cache list --json id,createdAt --jq '.[] | select(now - (.createdAt | fromdateiso8601) > 86400) | .id' | while read id; do
            gh cache delete "$id" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate app icon
        run: swift Scripts/generate_icon.swift

      - name: Generate Xcode project
        env:
          H2PROXY_TEAM_ID: ""
          H2PROXY_APP_PROFILE: ""
          H2PROXY_TUNNEL_PROFILE: ""
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme H2Proxy \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ${{ runner.temp }}/DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            2>&1 | tee ${{ runner.temp }}/build.log | xcpretty || { cat ${{ runner.temp }}/build.log | grep -A5 "error:"; exit 1; }

      - name: Package unsigned app
        run: |
          APP_PATH=$(find "${{ runner.temp }}/DerivedData" -name "H2Proxy.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: H2Proxy.app not found"
            find "${{ runner.temp }}/DerivedData" -type d -name "*.app" || true
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/Payload"
          cp -R "$APP_PATH" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}" && zip -r H2Proxy-unsigned.ipa Payload/

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: H2Proxy-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/H2Proxy-unsigned.ipa
          retention-days: 1
