name: Build H2Proxy IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  XCODE_VERSION: "15.4"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('project.yml', '**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Delete old caches
        run: |
          echo "Cleaning caches older than 1 day..."
          gh cache list --json id,createdAt --jq '.[] | select(now - (.createdAt | fromdateiso8601) > 86400) | .id' | while read id; do
            gh cache delete "$id" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate app icon
        run: swift Scripts/generate_icon.swift

      - name: Generate Xcode project
        env:
          H2PROXY_TEAM_ID: ""
          H2PROXY_APP_PROFILE: ""
          H2PROXY_TUNNEL_PROFILE: ""
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -scheme H2Proxy \
            -destination "generic/platform=iOS" \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Package unsigned app
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "H2Proxy.app" -type d | head -1)
          mkdir -p $RUNNER_TEMP/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP && zip -r H2Proxy-unsigned.ipa Payload/

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: H2Proxy-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/H2Proxy-unsigned.ipa
          retention-days: 1
