name: H2Proxy
options:
  bundleIdPrefix: com.h2proxy
  deploymentTarget:
    iOS: "13.0"
  xcodeVersion: "15.0"
  objectVersion: 56

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  H2Proxy:
    type: application
    platform: iOS
    sources:
      - path: H2Proxy/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.h2proxy.app
        INFOPLIST_FILE: H2Proxy/Info.plist
        CODE_SIGN_ENTITLEMENTS: H2Proxy/H2Proxy.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: H2ProxyTunnel

  H2ProxyTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: H2ProxyTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.h2proxy.app.tunnel
        INFOPLIST_FILE: H2ProxyTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: H2ProxyTunnel/H2ProxyTunnel.entitlements
        SKIP_INSTALL: "YES"

schemes:
  H2Proxy:
    build:
      targets:
        H2Proxy: all
        H2ProxyTunnel: all
    archive:
      config: Release
